<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <link rel="shortcut icon" href="./assets/jobs.png" type="image/x-icon">
    <!-- tailwind css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
     <!-- fontAwesome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- style of css -->
    <style>*{font-family: "Geist", sans-serif;}</style>
     <title>Homes | Tracker</title>
</head>

<body class="bg-gray-100">

<header id="header" class=" pt-10 pb-8 w-[75%] mx-auto space-y-2 border-b-2 border-gray-300">
    <h1 class="text-2xl font-extrabold ">Job Application Tracker</h1>
    
    <div class="grid grid-cols-3 gap-4">
        <div class="bg-white rounded-sm p-3 ">
            <p class="">Total</p>
            <p id="total-count" class="text-black font-bold">0</p>
        </div>

        <div class="bg-white rounded-sm p-3">
            <p class="">Interview</p>
            <p id="interview-count" class=" text-green-500 font-bold" >0</p>
        </div>

        <div class="bg-white rounded-sm p-3">
            <p>Rejected</p>
            <p id="rejected-count" class="  text-red-500 font-bold">0</p>
        </div>
    </div>
</header>

<main class="pb-5">
    <section class="w-[75%] mx-auto pb-4 ">
        <div class="flex justify-between py-2.5">
            <h2 class="font-medium">Available jobs</h2>
            <p id="available-jobs" class="text-gray-400 text-sm"><span class="total-count">0</span> jobs</p>
        </div>

        <div class="flex justify-start gap-3  ">
            
            <button onclick="toggulButton('all-btn'),showOnly('card-container')" id="all-btn" class=" border rounded-md px-9 py-2.5 btn bg-blue-400 text-white">All</button>
            <button onclick="toggulButton('interview-btn'),showOnly('interview-container')" id="interview-btn" class="border rounded-md px-4 py-2.5 btn bg-white text-gray-400">Interview</button>
            <button onclick="toggulButton('rejected-btn'),showOnly('rejected-container')" id="rejected-btn" class="border rounded-md px-4 py-2.5 btn bg-white text-gray-400">Rejected</button> 

        </div>
    </section>
    <section id="card-container" class="w-[75%] mx-auto space-y-7">  

    </section>
    
    <section id="interview-container" class="w-[75%] mx-auto space-y-5 hidden">  
        <div class="no-jobs flex flex-col space-y-5 bg-white py-16 px-10 rounded-md ">
            <div class="flex justify-center">
                <img src="./assets/jobs.png" alt="">
            </div>
            <div class="text-center">
                <h1 class="text-xl font-medium">No jobs available</h1>
                <p class="text-[14px] text-gray-500">Check back soon for new job opportunities</p>
            </div>
        </div>
    </section>

    <section id="rejected-container" class="w-[75%] mx-auto space-y-5 hidden ">  
        <div class="no-jobs flex flex-col space-y-5 bg-white py-16 px-10 rounded-md ">
            <div class="flex justify-center">
                <img src="./assets/jobs.png" alt="">
            </div>
            <div class="text-center">
                <h1 class="text-xl font-medium">No jobs available</h1>
                <p class="text-[14px] text-gray-500">Check back soon for new job opportunities</p>
            </div>
        </div>
    </section>
</main>


<script src="./data.js"></script>
<script src="./scripts.js"></script>

</body>
</html>
